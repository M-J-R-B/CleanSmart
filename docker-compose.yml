services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: cleansmart-postgres
    environment:
      POSTGRES_USER: cleansmart
      POSTGRES_PASSWORD: cleansmart
      POSTGRES_DB: cleansmart_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cleansmart -d cleansmart_dev"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cleansmart-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

volumes:
  postgres_data:
