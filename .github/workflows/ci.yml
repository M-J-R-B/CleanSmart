name: CI
on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: cleansmart
          POSTGRES_PASSWORD: cleansmart
          POSTGRES_DB: cleansmart_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U cleansmart"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://cleansmart:cleansmart@localhost:5432/cleansmart_test?schema=public
      REDIS_URL: redis://localhost:6379
      PORT: 3000
      JWT_ACCESS_SECRET: test-access-secret-must-be-32-plus-chars-long-yep
      JWT_REFRESH_SECRET: test-refresh-secret-must-be-32-plus-chars-different
      ACCESS_TOKEN_TTL_SECONDS: 900
      REFRESH_TOKEN_TTL_SECONDS: 2592000
      TWILIO_ACCOUNT_SID: ACtestaccountsid
      TWILIO_AUTH_TOKEN: testauthtoken12345
      TWILIO_VERIFY_SERVICE_SID: VAtestverifysid
      PERSONA_WEBHOOK_SECRET: testsecret
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20.12.2"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @cleansmart/db prisma:migrate:deploy
      - run: pnpm --filter @cleansmart/db prisma:generate
      - run: pnpm --filter @cleansmart/db --filter @cleansmart/shared build
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build
